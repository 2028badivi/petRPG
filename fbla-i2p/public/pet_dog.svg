<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
  <!-- Body -->
  <rect x="8" y="14" width="16" height="12" fill="#8B4513"/>
  <!-- Head -->
  <rect x="18" y="10" width="10" height="10" fill="#A0522D"/>
  <!-- Ears -->
  <rect x="18" y="8" width="4" height="4" fill="#5D2E0A"/>
  <rect x="24" y="8" width="4" height="4" fill="#5D2E0A"/>
  <!-- Eyes -->
  <rect x="20" y="12" width="2" height="2" fill="white"/>
  <rect x="24" y="12" width="2" height="2" fill="white"/>
  <rect x="21" y="12" width="1" height="1" fill="black"/>
  <rect x="25" y="12" width="1" height="1" fill="black"/>
  <!-- Nose -->
  <rect x="22" y="15" width="2" height="2" fill="black"/>
  <!-- Tail -->
  <rect x="6" y="14" width="4" height="4" fill="#8B4513"/>
  <!-- Legs -->
  <rect x="10" y="26" width="4" height="4" fill="#5D2E0A"/>
  <rect x="20" y="26" width="4" height="4" fill="#5D2E0A"/>
</svg>
